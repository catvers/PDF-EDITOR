<style>
  :root { --bg:#f7f7f9; --card:#ffffff; --line:#ececf1; --ink:#111114; --muted:#6b7280; --brand:#e11d48; }
  html,body { background:var(--bg); color:var(--ink); font-family:'Inter',ui-sans-serif,system-ui; }

  .drop-zone { border:2px dashed #e4e4e7; border-radius:18px; transition:all .15s ease; }
  .drop-zone.drag { border-color:var(--brand); background:#fff1f2; }

  .btn-primary:hover { background:#be123c; }
  .btn-ghost { background:#fff; border:1px solid var(--line); }

  .page-thumb:hover { transform:translateY(-1px); }
  .page-thumb.selected { outline:3px solid var(--brand); }
  .page-thumb.del { opacity:.4; }
  .page-thumb.del::after { content:'DELETE'; position:absolute; top:8px; left:8px; background:var(--brand); color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; letter-spacing:.5px; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; background:#fff1f2; color:var(--brand); font-weight:600; }
  .chat-shadow { box-shadow: 0 25px 60px -15px rgba(0,0,0,.25); }
  .crop-wrap { position:relative; display:inline-block; touch-action:none; user-select:none; }
  .crop-wrap canvas { display:block; max-width:100%; }
  .crop-rect { position:absolute; border:2px dashed var(--brand); background:rgba(225,29,72,.08); cursor:move; touch-action:none; }
  .crop-handle { position:absolute; width:14px; height:14px; background:#fff; border:2px solid var(--brand); border-radius:3px; touch-action:none; }
  .ch-nw { left:-7px; top:-7px; cursor:nwse-resize; }
  .ch-ne { right:-7px; top:-7px; cursor:nesw-resize; }
  .ch-sw { left:-7px; bottom:-7px; cursor:nesw-resize; }
  .ch-se { right:-7px; bottom:-7px; cursor:nwse-resize; }
  .spinner { width:18px; height:18px; border:2px solid #fecdd3; border-top-color:var(--brand); border-radius:50%; animation:spin 1s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#111114; color:#fff; padding:10px 16px; border-radius:10px; font-size:14px; z-index:90; opacity:0; transition:opacity .2s ease; pointer-events:none; max-width:90vw; }
  .toast.show { opacity:1; }
  .fade-in { animation: fade .25s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:none;} }
  .chip { padding:6px 10px; border-radius:999px; background:#f4f4f5; font-size:12px; font-weight:500; cursor:pointer; }
  .chip:hover { background:#e4e4e7; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { background:#fff; border-radius:16px; max-width:480px; width:100%; padding:20px; box-shadow:0 25px 60px -15px rgba(0,0,0,.4); }

<script>
const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;
const view = document.getElementById('view');
const toastEl = document.getElementById('toast');
const toast = (m) => { toastEl.textContent = m; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2400); };
const icon = (svg) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svg}</svg>`;

/* Safe base64 for large buffers */
function u8ToB64(u8){ let s=''; const CH=0x8000; for(let i=0;i<u8.length;i+=CH) s += String.fromCharCode.apply(null, u8.subarray(i,i+CH)); return btoa(s); }

/* Modal helper */
function modal(html) {
  return new Promise(resolve => {
    const root = document.getElementById('modalRoot');
    root.innerHTML = `<div class="modal-bg"><div class="modal">${html}</div></div>`;
    root.querySelector('.modal-bg').addEventListener('click', e=>{ if(e.target.classList.contains('modal-bg')){ root.innerHTML=''; resolve(null); } });
    root._resolve = (v) => { root.innerHTML=''; resolve(v); };
  });
}

/* Preview + rename modal, then download */
async function previewAndDownload(bytes, defaultName, mime='application/pdf') {
  const blob = bytes instanceof Blob ? bytes : new Blob([bytes], { type: mime });
  const url = URL.createObjectURL(blob);
  const isPdf = mime === 'application/pdf';
  const previewBlock = isPdf
    ? `<iframe src="${url}" class="preview-frame"></iframe>`
    : `<div class="text-center text-sm text-gray-500 py-10 border rounded-lg">Preview not available for this file type.</div>`;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal" style="max-width:720px">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 rounded-lg bg-brand text-white flex items-center justify-center font-bold">✓</div>
          <div class="flex-1"><div class="font-bold">Ready to download</div><div class="text-xs text-gray-500">Preview the result and rename if you want.</div></div>
          <button id="mClose" class="text-gray-400 hover:text-gray-700 text-xl leading-none">✕</button>
        </div>
        ${previewBlock}
        <div class="mt-4">
          <label class="text-sm font-medium">File name</label>
          <input id="mName" class="selectable w-full mt-1 px-3 py-2 rounded-lg border border-[var(--line)] outline-none focus:border-brand" value="${defaultName.replace(/"/g,'&quot;')}"/>
        </div>
        <div class="mt-4 flex gap-2 justify-end">
          <button id="mCancel" class="btn-ghost px-4 py-2 rounded-lg text-sm">Cancel</button>
          <button id="mDownload" class="btn-primary px-5 py-2 rounded-lg text-sm font-semibold">Download</button>
        </div>
      </div>
    </div>`;
  return new Promise(resolve => {
    const close = (ok) => { root.innerHTML=''; URL.revokeObjectURL(url); resolve(ok); };
    root.querySelector('#mClose').onclick = ()=>close(false);
    root.querySelector('#mCancel').onclick = ()=>close(false);
    root.querySelector('#mDownload').onclick = () => {
      let name = root.querySelector('#mName').value.trim() || defaultName;
      const a = document.createElement('a'); a.href = url; a.download = name; a.click();
      setTimeout(()=>close(true), 250);
    };
    root.querySelector('.modal-bg').addEventListener('click', e=>{ if(e.target.classList.contains('modal-bg')) close(false); });
  });
}

  { id:'reorder',  name:'Reorder Pages', desc:'Drag thumbnails to rearrange pages.',      icon:icon('<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>') },

  { id:'protect',  name:'Protect PDF',   desc:'Lock your PDF behind a password.',         icon:icon('<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>') },
  { id:'img2pdf',  name:'Images → PDF',  desc:'Turn JPG/PNG photos into a single PDF.',   icon:icon('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>') },
  { id:'pdf2img',  name:'PDF → Images',  desc:'Export each page as a PNG (zipped).',      icon:icon('<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 5 5 4-4 4 4"/>') },
  { id:'crop',     name:'Crop PDF',      desc:'Manual marquee or auto-crop margins.',     icon:icon('<path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/>') },
  { id:'number',   name:'Page Numbers',  desc:'Add page numbers in any corner.',          icon:icon('<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V9l-2 2"/><path d="M14 9h3v3h-3z"/>') },
  { id:'watermark',name:'Watermark',     desc:'Stamp text across every page.',            icon:icon('<path d="M3 3l18 18"/><path d="M21 3L3 21"/>') },
];

/* ---------- Router ---------- */
function go(toolId) {
  if (toolId === 'about') return renderAbout();
  if (!toolId || toolId==='home') return renderHome();
  const tool = TOOLS.find(t=>t.id===toolId); if (!tool) return renderHome();
  renderTool(tool);
}
document.getElementById('homeBtn').onclick = ()=>go('home');
document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));

function renderHome() {
  view.innerHTML = `
    <section class="fade-in">
      <div class="text-center max-w-2xl mx-auto mb-10 mt-2">
        <span class="badge">All-in-one PDF toolkit</span>

        <p class="text-gray-500 mt-3">Merge, split, compress, protect, crop, convert — everything runs in your browser. Your files never leave your device.</p>
      </div>
      <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>`;
  const grid = document.getElementById('grid');
  grid.innerHTML = TOOLS.map(t=>`
    <button data-id="${t.id}" class="tool-card text-left card p-5 flex gap-4 items-start">
      <div class="tool-icon shrink-0">${t.icon}</div>
      <div class="flex-1">
        <div class="font-semibold">${t.name}</div>
        <div class="text-sm text-gray-500 mt-1">${t.desc}</div>
      </div>
    </button>`).join('');
  grid.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>go(b.dataset.id));
}

function toolHeader(tool) {
  return `
  <div class="flex items-center gap-3 mb-6 fade-in">
    <button id="backBtn" class="btn-ghost w-10 h-10 rounded-xl flex items-center justify-center">←</button>
    <div class="tool-icon">${tool.icon}</div>
    <div>
      <div class="font-bold text-lg">${tool.name}</div>
      <div class="text-sm text-gray-500">${tool.desc}</div>
    </div>
  </div>`;
}

function dropZone({ accept='application/pdf', multiple=true, label='Drop PDFs here or click to browse' }) {
  return `
  <label class="drop-zone block p-10 text-center cursor-pointer card">
    <input type="file" class="hidden" accept="${accept}" ${multiple?'multiple':''}/>
    <div class="mx-auto w-14 h-14 rounded-2xl bg-[var(--bg)] flex items-center justify-center mb-3">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="font-semibold">${label}</div>
    <div class="text-sm text-gray-500 mt-1">Files are processed locally in your browser.</div>
  </label>`;
}

function wireDrop(el, onFiles) {
  const input = el.querySelector('input[type=file]');
  input.onchange = e => onFiles([...e.target.files]);
  ['dragenter','dragover'].forEach(ev=>el.addEventListener(ev, e=>{ e.preventDefault(); el.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev=>el.addEventListener(ev, e=>{ e.preventDefault(); el.classList.remove('drag'); }));
  el.addEventListener('drop', e=>{ if (e.dataTransfer.files.length) onFiles([...e.dataTransfer.files]); });
}

/* Inline live preview of a PDF buffer */
async function inlinePreview(container, buf) {
  const url = URL.createObjectURL(new Blob([buf.slice(0)], {type:'application/pdf'}));
  container.innerHTML = `
    <div class="card p-3 mt-4">
      <div class="text-xs text-gray-500 mb-2 font-medium">Live preview</div>
      <iframe src="${url}" class="preview-frame"></iframe>
    </div>`;
  return url;
}

/* ---------- Tool renderers ---------- */
function renderTool(tool) {
  view.innerHTML = toolHeader(tool) + `<div id="toolBody" class="fade-in"></div>`;
  document.getElementById('backBtn').onclick = ()=>go();
  ({
    merge: toolMerge, split: toolSplit,
    delete: toolDelete, reorder: toolReorder, rotate: toolRotate,
    compress: toolCompress, protect: toolProtect,
    img2pdf: toolImg2Pdf, pdf2img: toolPdf2Img,
    crop: toolCrop, number: toolNumber, watermark: toolWatermark,
  })[tool.id]();
}

/* ---------- Merge ---------- */
function toolMerge() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({label:'Drop PDFs to merge (2+)'}) + `
    <div id="list" class="mt-4 space-y-2"></div>
    <div id="pvWrap"></div>
    <div class="mt-6 flex gap-3"><button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium disabled:opacity-40" disabled>Merge & Preview</button></div>`;
  const dz = body.querySelector('.drop-zone'); const list = document.getElementById('list'); const goBtn = document.getElementById('go');
  let files = [];
  const render = () => {
    list.innerHTML = files.map((f,i)=>`<div class="card px-4 py-3 flex items-center gap-3"><div class="badge">${i+1}</div><div class="flex-1 truncate">${f.name}</div><div class="text-xs text-gray-500">${(f.size/1024).toFixed(0)} KB</div><button data-i="${i}" class="text-gray-400 hover:text-brand text-lg leading-none">✕</button></div>`).join('');
    list.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>{ files.splice(+b.dataset.i,1); render(); });
    goBtn.disabled = files.length < 2;
  };
  wireDrop(dz, fs => { files.push(...fs.filter(f=>f.type==='application/pdf')); render(); });
  goBtn.onclick = async () => {
    goBtn.disabled = true; goBtn.innerHTML = '<span class="spinner mr-2"></span>Merging…';
    try {
      const out = await PDFDocument.create();
      for (const f of files) {
        const src = await PDFDocument.load(await f.arrayBuffer(), { ignoreEncryption:true });
        const pages = await out.copyPages(src, src.getPageIndices());
        pages.forEach(p=>out.addPage(p));
      }
      const bytes = await out.save();
      await previewAndDownload(bytes, 'merged.pdf');
    } catch(e){ toast('Failed: '+e.message); }
    goBtn.disabled = false; goBtn.textContent = 'Merge & Preview';
  };
}

/* ---------- Page-thumb tools: shared ---------- */
async function loadThumbsGrid(buf, container, opts={}) {
  container.innerHTML = '<div class="col-span-full text-center text-sm text-gray-500 py-8"><span class="spinner mr-2"></span>Rendering pages…</div>';
  const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
  const info = []; container.innerHTML='';
  for (let i=1;i<=pdf.numPages;i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale:0.5 });
    const c = document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
    await page.render({ canvasContext:c.getContext('2d'), viewport:vp }).promise;
    const wrap = document.createElement('div');
    wrap.className='page-thumb p-2 cursor-pointer';
    wrap.dataset.idx = i-1;
    wrap.innerHTML = `<div class="aspect-[3/4] flex items-center justify-center overflow-hidden bg-gray-50 rounded"><img style="max-width:100%;max-height:100%;transition:transform .2s ease" src="${c.toDataURL()}"/></div><div class="mt-1 text-xs text-center text-gray-500 font-medium">Page ${i}</div>`;
    if (opts.draggable) wrap.draggable = true;
    container.appendChild(wrap);
    info.push({ index:i-1, rotate:0, selected:false, el:wrap });
  }
  return info;
}

/* ---------- Delete (full thumbnail picker) ---------- */
function toolDelete() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false, label:'Drop a PDF to choose pages to delete'}) + `
    <div id="ctrls" class="hidden mt-4 flex flex-wrap items-center gap-3">
      <div class="text-sm text-gray-600">Click pages to mark for deletion. <span id="cnt" class="font-semibold text-brand">0</span> selected.</div>
      <button id="selAll" class="btn-ghost px-3 py-1.5 rounded-lg text-xs">Select all</button>
      <button id="clr" class="btn-ghost px-3 py-1.5 rounded-lg text-xs">Clear</button>
      <div class="flex-1"></div>
      <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Delete & Preview</button>
    </div>
    <div id="thumbs" class="mt-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>`;
  const dz = body.querySelector('.drop-zone'); const thumbs = document.getElementById('thumbs');
  let buf=null, info=[];
  const updateCnt = ()=>document.getElementById('cnt').textContent = info.filter(p=>p.selected).length;
  wireDrop(dz, async fs => {
    if (!fs[0]) return; buf = await fs[0].arrayBuffer();
    info = await loadThumbsGrid(buf, thumbs);
    info.forEach(p => p.el.onclick = () => { p.selected = !p.selected; p.el.classList.toggle('del', p.selected); updateCnt(); });
    document.getElementById('ctrls').classList.remove('hidden');
    updateCnt();
  });
  document.addEventListener('click', async e=>{
    if (e.target.id==='selAll' && info.length) { info.forEach(p=>{ p.selected=true; p.el.classList.add('del'); }); updateCnt(); }
    if (e.target.id==='clr' && info.length) { info.forEach(p=>{ p.selected=false; p.el.classList.remove('del'); }); updateCnt(); }
    if (e.target.id==='go' && buf) {
      const keep = info.filter(p=>!p.selected);
      if (!keep.length) return toast('Cannot delete every page');
      const src = await PDFDocument.load(buf,{ignoreEncryption:true});
      const out = await PDFDocument.create();
      const copied = await out.copyPages(src, keep.map(p=>p.index));
      copied.forEach(p=>out.addPage(p));
      await previewAndDownload(await out.save(), 'edited.pdf');
    }
  });
}

/* ---------- Reorder ---------- */
function toolReorder() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false}) + `
    <div id="ctrls" class="hidden mt-4 flex items-center gap-3">
      <div class="text-sm text-gray-600">Drag thumbnails to reorder.</div>
      <div class="flex-1"></div>
      <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Save & Preview</button>
    </div>
    <div id="thumbs" class="mt-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>`;
  const dz = body.querySelector('.drop-zone'); const thumbs = document.getElementById('thumbs');
  let buf=null, info=[];
  function bindDnd() {
    let dragIdx=null;
    [...thumbs.children].forEach((el,i)=>{
      el.draggable=true;
      el.ondragstart=()=>{ dragIdx=i; el.style.opacity='.4'; };
      el.ondragend=()=>el.style.opacity='1';
      el.ondragover=e=>e.preventDefault();
      el.ondrop=()=>{ if(dragIdx===null||dragIdx===i)return; const [m]=info.splice(dragIdx,1); info.splice(i,0,m); thumbs.innerHTML=''; info.forEach(p=>thumbs.appendChild(p.el)); bindDnd(); };
    });
  }
  wireDrop(dz, async fs => { buf = await fs[0].arrayBuffer(); info = await loadThumbsGrid(buf, thumbs, {draggable:true}); document.getElementById('ctrls').classList.remove('hidden'); bindDnd(); });
  document.addEventListener('click', async e=>{
    if (e.target.id!=='go' || !buf) return;
    const src = await PDFDocument.load(buf,{ignoreEncryption:true}); const out = await PDFDocument.create();
    const copied = await out.copyPages(src, info.map(p=>p.index)); copied.forEach(p=>out.addPage(p));
    await previewAndDownload(await out.save(), 'reordered.pdf');
  });
}

function toolCompress() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false}) + `
    <div id="opts" class="hidden card p-5 mt-4 space-y-4">
      <div><label class="text-sm font-medium">Image quality: <span id="qv" class="font-semibold">60</span>%</label>

      <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Compress & Preview</button>
    </div>
    <div id="pv"></div>`;
  const dz = body.querySelector('.drop-zone'); let buf=null, origSize=0;
  wireDrop(dz, async fs => { buf = await fs[0].arrayBuffer(); origSize=fs[0].size; document.getElementById('opts').classList.remove('hidden'); inlinePreview(document.getElementById('pv'), buf); });
  document.addEventListener('input', e=>{
    if (e.target.id==='q') document.getElementById('qv').textContent=e.target.value;
    if (e.target.id==='s') document.getElementById('sv').textContent=e.target.value;
  });
  document.addEventListener('click', async e=>{
    if (e.target.id!=='go' || !buf) return;
    const btn = e.target; btn.disabled=true; btn.innerHTML='<span class="spinner mr-2"></span>Compressing…';
    try {
      const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      const out = await PDFDocument.create();
      const scale = parseFloat(document.getElementById('s').value), quality = parseInt(document.getElementById('q').value)/100;
      for (let i=1;i<=pdf.numPages;i++) {
        const page = await pdf.getPage(i); const vp = page.getViewport({scale});
        const c = document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
        await page.render({ canvasContext:c.getContext('2d'), viewport:vp }).promise;
        const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',quality));
        const img = await out.embedJpg(await blob.arrayBuffer());
        const p = out.addPage([vp.width, vp.height]);
        p.drawImage(img,{x:0,y:0,width:vp.width,height:vp.height});
      }
      const bytes = await out.save();
      toast(`${(origSize/1024).toFixed(0)} KB → ${(bytes.byteLength/1024).toFixed(0)} KB`);
      await previewAndDownload(bytes,'compressed.pdf');
    } catch(err){ toast('Failed: '+err.message); }
    btn.disabled=false; btn.textContent='Compress & Preview';
  });
}

    list.innerHTML = imgs.map((f,i)=>`<div class="card p-2 relative"><img src="${URL.createObjectURL(f)}" class="w-full aspect-square object-cover rounded"/><button data-i="${i}" class="absolute top-1 right-1 w-7 h-7 rounded-full bg-white shadow text-xs">✕</button><div class="text-xs mt-1 truncate text-center selectable">${f.name}</div></div>`).join('');

/* ---------- Crop (fixed manual drag with pointer events) ---------- */
function toolCrop() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false}) + `
    <div id="opts" class="hidden mt-4">
      <div class="flex flex-wrap gap-3 mb-4">
        <button id="auto" class="btn-ghost px-4 py-2 rounded-lg text-sm">Auto-crop white margins</button>
        <button id="reset" class="btn-ghost px-4 py-2 rounded-lg text-sm">Reset</button>
        <div class="flex-1"></div>
        <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Apply to all & Preview</button>
      </div>
      <div class="card p-4 flex justify-center overflow-auto"><div id="cropWrap" class="crop-wrap"></div></div>
      <div class="text-xs text-gray-500 mt-3 text-center">Drag inside the red box to move it. Drag any corner handle to resize. The same crop is applied to every page.</div>
    </div>`;
  const dz = body.querySelector('.drop-zone'); let buf=null, canvas=null, rect={x:0,y:0,w:0,h:0}, pageVp=null, wrapEl=null;
  wireDrop(dz, async fs => { buf = await fs[0].arrayBuffer(); await renderPreview(); document.getElementById('opts').classList.remove('hidden'); });

  async function renderPreview() {
    const pdf = await pdfjsLib.getDocument({data:buf.slice(0)}).promise;
    const page = await pdf.getPage(1); pageVp = page.getViewport({scale:1});
    const scale = Math.min(720/pageVp.width, 800/pageVp.height, 1.4);
    const vp = page.getViewport({scale});
    canvas = document.createElement('canvas'); canvas.width=vp.width; canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    wrapEl = document.getElementById('cropWrap'); wrapEl.innerHTML=''; wrapEl.appendChild(canvas);
    rect = { x:30, y:30, w:vp.width-60, h:vp.height-60 };
    mountRect();
  }

  function mountRect() {
    let r = wrapEl.querySelector('.crop-rect');
    if (!r) {
      r = document.createElement('div'); r.className='crop-rect';
      r.innerHTML = '<div class="crop-handle ch-nw" data-h="nw"></div><div class="crop-handle ch-ne" data-h="ne"></div><div class="crop-handle ch-sw" data-h="sw"></div><div class="crop-handle ch-se" data-h="se"></div>';
      wrapEl.appendChild(r);
      attachDrag(r);
    }
    paintRect();
  }
  function paintRect() {
    const r = wrapEl.querySelector('.crop-rect');
    Object.assign(r.style, { left:rect.x+'px', top:rect.y+'px', width:rect.w+'px', height:rect.h+'px' });
  }
  function attachDrag(r) {
    let mode=null, handle=null, start=null, startRect=null;
    const wrapRect = () => wrapEl.getBoundingClientRect();
    const onDown = (e) => {
      const t = e.target;
      if (t.classList && t.classList.contains('crop-handle')) { mode='resize'; handle=t.dataset.h; }
      else if (t === r) { mode='move'; }
      else return;
      const p = e.touches ? e.touches[0] : e;
      start = { x: p.clientX, y: p.clientY };
      startRect = {...rect};
      e.preventDefault();
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchmove', onMove, {passive:false});
      window.addEventListener('touchend', onUp);
    };
    const onMove = (e) => {
      if (!mode) return;
      const p = e.touches ? e.touches[0] : e;
      const dx = p.clientX - start.x, dy = p.clientY - start.y;
      if (mode==='move') {
        rect.x = Math.max(0, Math.min(canvas.width - startRect.w, startRect.x + dx));
        rect.y = Math.max(0, Math.min(canvas.height - startRect.h, startRect.y + dy));
      } else {
        let nx=startRect.x, ny=startRect.y, nw=startRect.w, nh=startRect.h;
        if (handle.includes('e')) nw = Math.max(30, startRect.w + dx);
        if (handle.includes('s')) nh = Math.max(30, startRect.h + dy);
        if (handle.includes('w')) { nx = startRect.x + dx; nw = startRect.w - dx; if (nw<30){ nx=startRect.x+startRect.w-30; nw=30; } }
        if (handle.includes('n')) { ny = startRect.y + dy; nh = startRect.h - dy; if (nh<30){ ny=startRect.y+startRect.h-30; nh=30; } }
        nx = Math.max(0, nx); ny = Math.max(0, ny);
        nw = Math.min(nw, canvas.width - nx); nh = Math.min(nh, canvas.height - ny);
        rect = { x:nx, y:ny, w:nw, h:nh };
      }
      paintRect();
      e.preventDefault();
    };
    const onUp = () => {
      mode=null; handle=null;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    r.addEventListener('mousedown', onDown);
    r.addEventListener('touchstart', onDown, {passive:false});
  }

  document.addEventListener('click', async e=>{
    if (e.target.id==='reset' && canvas) { rect={x:30,y:30,w:canvas.width-60,h:canvas.height-60}; paintRect(); }
    if (e.target.id==='auto' && canvas) {
      const ctx=canvas.getContext('2d'); const d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
      const isWhite=(i)=>d[i]>240&&d[i+1]>240&&d[i+2]>240;
      let t=0,b=canvas.height-1,l=0,rr=canvas.width-1;
      outer: for(;t<canvas.height;t++){ for(let x=0;x<canvas.width;x++){ if(!isWhite((t*canvas.width+x)*4)) break outer; } }
      outer: for(;b>t;b--){ for(let x=0;x<canvas.width;x++){ if(!isWhite((b*canvas.width+x)*4)) break outer; } }
      outer: for(;l<canvas.width;l++){ for(let y=t;y<b;y++){ if(!isWhite((y*canvas.width+l)*4)) break outer; } }
      outer: for(;rr>l;rr--){ for(let y=t;y<b;y++){ if(!isWhite((y*canvas.width+rr)*4)) break outer; } }
      rect={x:Math.max(0,l-4),y:Math.max(0,t-4),w:Math.min(canvas.width,rr-l+8),h:Math.min(canvas.height,b-t+8)};
      paintRect();
    }
    if (e.target.id==='go' && buf) {
      const sx = canvas.width / pageVp.width, sy = canvas.height / pageVp.height;
      const pdf = await PDFDocument.load(buf,{ignoreEncryption:true});
      pdf.getPages().forEach(p=>{
        const {height}=p.getSize();
        const x = rect.x/sx, y = rect.y/sy, w = rect.w/sx, h = rect.h/sy;
        p.setCropBox(x, height - y - h, w, h);
      });
      await previewAndDownload(await pdf.save(),'cropped.pdf');
    }
  });
}

/* ---------- Page numbers ---------- */
function toolNumber() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false}) + `
    <div id="opts" class="hidden card p-5 mt-4 space-y-4">
      <div><label class="text-sm font-medium">Position</label>
        <select id="pos" class="w-full mt-2 px-3 py-2 rounded-lg border border-[var(--line)] outline-none">
          <option value="br">Bottom right</option><option value="bl">Bottom left</option><option value="bc">Bottom center</option>
          <option value="tr">Top right</option><option value="tl">Top left</option><option value="tc">Top center</option>
        </select></div>
      <div><label class="text-sm font-medium">Font size</label>
        <input id="size" type="number" value="12" min="8" max="48" class="w-full mt-2 px-3 py-2 rounded-lg border border-[var(--line)] outline-none"/></div>
      <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Add Numbers & Preview</button>
    </div>
    <div id="pv"></div>`;
  const dz = body.querySelector('.drop-zone'); let buf=null;
  wireDrop(dz, async fs => { buf=await fs[0].arrayBuffer(); document.getElementById('opts').classList.remove('hidden'); inlinePreview(document.getElementById('pv'), buf); });
  document.addEventListener('click', async e=>{
    if(e.target.id!=='go'||!buf) return;
    const pdf = await PDFDocument.load(buf,{ignoreEncryption:true});
    const font = await pdf.embedFont(StandardFonts.Helvetica);
    const pos = document.getElementById('pos').value, sz = +document.getElementById('size').value;
    pdf.getPages().forEach((p,i,arr)=>{
      const {width,height}=p.getSize(); const txt = `${i+1} / ${arr.length}`; const tw = font.widthOfTextAtSize(txt,sz); const m=24;
      let x = pos.endsWith('r')?width-tw-m : pos.endsWith('l')?m : (width-tw)/2;
      let y = pos.startsWith('b')?m : height-sz-m;
      p.drawText(txt,{x,y,size:sz,font,color:rgb(0.1,0.1,0.12)});
    });
    await previewAndDownload(await pdf.save(),'numbered.pdf');
  });
}

/* ---------- Watermark ---------- */
function toolWatermark() {
  const body = document.getElementById('toolBody');
  body.innerHTML = dropZone({multiple:false}) + `
    <div id="opts" class="hidden card p-5 mt-4 space-y-4">
      <div><label class="text-sm font-medium">Watermark text</label>
        <input id="txt" class="selectable w-full mt-2 px-3 py-2 rounded-lg border border-[var(--line)] outline-none" placeholder="CONFIDENTIAL"/></div>
      <div><label class="text-sm font-medium">Opacity: <span id="ov" class="font-semibold">30</span>%</label>
        <input id="op" type="range" min="10" max="80" value="30" class="w-full mt-2 accent-brand"/></div>
      <button id="go" class="btn-primary px-5 py-2.5 rounded-xl font-medium">Apply & Preview</button>
    </div>
    <div id="pv"></div>`;
  const dz = body.querySelector('.drop-zone'); let buf=null;
  wireDrop(dz, async fs => { buf=await fs[0].arrayBuffer(); document.getElementById('opts').classList.remove('hidden'); inlinePreview(document.getElementById('pv'), buf); });
  document.addEventListener('input', e=>{ if(e.target.id==='op') document.getElementById('ov').textContent=e.target.value; });
  document.addEventListener('click', async e=>{
    if(e.target.id!=='go'||!buf) return;
    const pdf = await PDFDocument.load(buf,{ignoreEncryption:true});
    const font = await pdf.embedFont(StandardFonts.HelveticaBold);
    const txt = (document.getElementById('txt').value||'CONFIDENTIAL').toUpperCase();
    const op = +document.getElementById('op').value/100;
    pdf.getPages().forEach(p=>{
      const {width,height}=p.getSize(); const sz = Math.min(width,height)/8;
      const tw = font.widthOfTextAtSize(txt,sz);
      p.drawText(txt,{ x:(width-tw*0.7)/2, y:height/2, size:sz, font, color:rgb(0.88,0.11,0.28), opacity:op, rotate:degrees(-30) });
    });
    await previewAndDownload(await pdf.save(),'watermarked.pdf');
  });
}

/* ---------- Chat ---------- */
const chatPanel = document.getElementById('chatPanel');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
document.getElementById('chatToggle').onclick = ()=>{ chatPanel.classList.toggle('hidden'); chatInput.focus(); };
document.getElementById('chatClose').onclick = ()=>chatPanel.classList.add('hidden');

const KB = [
  { k:['merge','combine','join'], a:"Open **Merge PDF**, drop 2+ PDFs, then click *Merge & Preview*.", tool:'merge' },
  { k:['split','extract','range'], a:"Use **Split PDF**. Enter ranges like `1-3,5,8-10` or click thumbnails to pick pages.", tool:'split' },
  { k:['delete','remove page'], a:"Open **Delete Pages**. You'll see every page — click the ones to delete, then preview & download.", tool:'delete' },
  { k:['reorder','rearrange','sort page'], a:"Use **Reorder Pages** and drag thumbnails.", tool:'reorder' },
  { k:['rotate','turn','sideways'], a:"Open **Rotate Pages**, select pages, then click 90°/180°.", tool:'rotate' },
  { k:['compress','reduce','smaller','size'], a:"Try **Compress PDF**. Lower quality / scale = smaller file.", tool:'compress' },
  { k:['protect','password','encrypt','lock'], a:"**Protect PDF** wraps your PDF in a password-locked HTML file. Open the HTML, enter the password, the PDF unlocks.", tool:'protect' },
  { k:['image','photo','jpg','png','picture'], a:"Use **Images → PDF**. Drop photos in the order you want them.", tool:'img2pdf' },
  { k:['pdf to image','png','export pages'], a:"**PDF → Images** renders each page as PNG and downloads a ZIP.", tool:'pdf2img' },
  { k:['crop','margin','trim'], a:"Open **Crop PDF**. Drag the red box (or its corners) to crop, or click *Auto-crop*.", tool:'crop' },
  { k:['number','pagina'], a:"Use **Page Numbers** and pick a corner.", tool:'number' },
  { k:['watermark','stamp'], a:"Use **Watermark** to stamp text on every page.", tool:'watermark' },
  { k:['about','contact','email','who'], a:"PDF MASTER is a privacy-first PDF toolkit. Contact: **catversstudio@gmail.com** or **asisasastudent@gmail.com**.", tool:'about' },
  { k:['safe','privacy','upload','server'], a:"100% safe. Every tool runs in your browser — files never leave your device." },
  { k:['rename'], a:"Before any download you'll see a preview and can rename the output file." },
  { k:['hi','hello','hey'], a:"Hey! 👋 I'm the PDF MASTER assistant. Try *how do I merge* or *reduce file size*." },
  { k:['thank'], a:"You're welcome! 🙌" },
];

function addMsg(text, who='bot', toolId=null) {
  const wrap = document.createElement('div'); wrap.className = `flex ${who==='me'?'justify-end':'justify-start'}`;
  const bubble = document.createElement('div');
  bubble.className = who==='me'
    ? 'max-w-[80%] bg-brand text-white rounded-2xl rounded-br-md px-3 py-2 text-sm selectable'
    : 'max-w-[85%] bg-white border border-[var(--line)] rounded-2xl rounded-bl-md px-3 py-2 text-sm selectable';
  bubble.innerHTML = text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code class="bg-gray-100 px-1 rounded">$1</code>');
  if (toolId) {
    const b = document.createElement('button'); b.className='mt-2 text-xs font-semibold text-brand hover:underline block'; b.textContent='→ Open this';
    b.dataset.tool = toolId;
    b.onclick = ()=>{ go(toolId); chatPanel.classList.add('hidden'); };
    bubble.appendChild(b);
  }
  wrap.appendChild(bubble); chatMessages.appendChild(wrap); chatMessages.scrollTop = chatMessages.scrollHeight;
  saveChat();
}
function reply(q) {
  const lc = q.toLowerCase();
  const hit = KB.find(e=>e.k.some(k=>lc.includes(k)));
  if (hit) addMsg(hit.a,'bot', hit.tool);
  else addMsg("I'm not sure about that one. Try asking about *merge*, *split*, *compress*, *protect*, *crop*, *images to PDF*, etc.",'bot');
}
function saveChat(){ try{ localStorage.setItem('pdfmaster_chat', chatMessages.innerHTML); }catch{} }
function loadChat(){
  const saved = localStorage.getItem('pdfmaster_chat');
  if (saved) {
    chatMessages.innerHTML = saved;
    chatMessages.querySelectorAll('button[data-tool]').forEach(b=>{ b.onclick = ()=>{ go(b.dataset.tool); chatPanel.classList.add('hidden'); }; });
  } else {
    addMsg("Hi! I'm your PDF MASTER assistant. Ask me how to merge, compress, protect, crop, and more.",'bot');
  }
}
document.getElementById('chatForm').onsubmit = e => {
  e.preventDefault(); const v = chatInput.value.trim(); if(!v) return;
  addMsg(v,'me'); chatInput.value=''; setTimeout(()=>reply(v), 350);
};

/* boot */
renderHome();
loadChat();
</script>
